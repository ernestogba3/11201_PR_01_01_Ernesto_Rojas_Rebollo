<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">CV — ML Engineer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:      #030712;
  --surf:    #0f172a;
  --card:    #1e293b;
  --border:  rgba(148,163,184,.12);
  --t1:      #f1f5f9;
  --t2:      #94a3b8;
  --t3:      #475569;
  --g-blue:  #4285F4;
  --g-red:   #EA4335;
  --g-yel:   #FBBC04;
  --g-grn:   #34A853;
  --sp-grn:  #1DB954;
  --st-pur:  #635BFF;
  --nf-red:  #E50914;
  --accent:  #4285F4;
  --glow:    rgba(66,133,244,.22);
  --sb-w:    260px;
  --mx: 50%; --my: 50%;
}
[data-theme="light"] {
  --bg:    #f8fafc;
  --surf:  #ffffff;
  --card:  #f1f5f9;
  --border:rgba(15,23,42,.1);
  --t1:    #0f172a;
  --t2:    #475569;
  --t3:    #94a3b8;
  --glow:  rgba(66,133,244,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1);
     display:flex;min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(148,163,184,.1) 1px,transparent 1px);
  background-size:26px 26px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(700px circle at var(--mx) var(--my),rgba(66,133,244,.09),transparent 45%);
  transition:background .1s}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
#sidebar{
  position:fixed;top:0;left:0;width:var(--sb-w);height:100vh;
  background:var(--surf);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  overflow-y:auto;overflow-x:hidden;
  transition:background .35s,transform .35s}
#sidebar::-webkit-scrollbar{width:3px}
.sb-top{padding:2rem 1.5rem 1.5rem;text-align:center;border-bottom:1px solid var(--border)}
.av-wrap{position:relative;width:90px;height:90px;margin:0 auto 1rem}
.av-ring{position:absolute;inset:-5px;border-radius:50%;
  background:conic-gradient(var(--g-blue),var(--g-red),var(--g-yel),var(--g-grn),var(--g-blue));
  animation:spin 6s linear infinite}
.av-mask{position:absolute;inset:3px;background:var(--surf);border-radius:50%;z-index:1}
.av-inner{position:absolute;inset:6px;border-radius:50%;z-index:2;
  background:linear-gradient(135deg,#1e3a8a,#1e40af);
  display:flex;align-items:center;justify-content:center;font-size:2.4rem}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sb-name{font-size:1.15rem;font-weight:800;letter-spacing:-.3px;margin-bottom:.2rem}
.grad-text{
  background:linear-gradient(90deg,var(--g-blue),var(--g-red),var(--g-yel),var(--g-grn),var(--g-blue));
  background-size:250%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:gradmov 5s linear infinite}
@keyframes gradmov{0%{background-position:0%}100%{background-position:250%}}
.sb-role{font-size:.78rem;color:var(--t2);letter-spacing:.5px;margin-bottom:.8rem}
.avail{display:inline-flex;align-items:center;gap:6px;background:rgba(52,168,83,.12);
  border:1px solid rgba(52,168,83,.3);border-radius:20px;padding:3px 12px;font-size:.72rem;color:#34A853}
.avail-dot{width:7px;height:7px;background:#34A853;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.sb-nav{padding:1.2rem .8rem;flex:1}
.sb-nav-item{display:flex;align-items:center;gap:.65rem;padding:.6rem .9rem;border-radius:8px;
  color:var(--t2);text-decoration:none;font-size:.85rem;transition:all .25s;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;position:relative;overflow:hidden}
.sb-nav-item::before{content:'';position:absolute;inset:0;opacity:0;border-radius:8px;
  background:linear-gradient(90deg,rgba(66,133,244,.15),transparent);transition:opacity .25s}
.sb-nav-item:hover,.sb-nav-item.active{color:var(--t1)}
.sb-nav-item:hover::before,.sb-nav-item.active::before{opacity:1}
.sb-nav-item.active{color:var(--accent);font-weight:600}
.nav-icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.65rem;
  padding:1px 7px;border-radius:10px;font-weight:700}
.sb-contact{padding:.8rem 1.5rem 1rem;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:.55rem}
.sb-ci{display:flex;align-items:center;gap:.6rem;font-size:.78rem;color:var(--t2);
  text-decoration:none;transition:color .2s}
.sb-ci:hover{color:var(--accent)}
.sb-ci-ico{font-size:.9rem;width:16px;text-align:center;flex-shrink:0}
.sb-ctrls{padding:.9rem 1.5rem 1.2rem;border-top:1px solid var(--border);display:flex;gap:.6rem}
.ctrl-btn{flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--t2);font-size:.78rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:all .25s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(66,133,244,.07)}
.dl-btn{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.dl-btn:hover{background:#3575e2;border-color:#3575e2;color:#fff;transform:none;
  box-shadow:0 4px 16px rgba(66,133,244,.35)}
.dl-btn.busy{opacity:.65;pointer-events:none}
.kb-hint{padding:.5rem 1.5rem .8rem;display:flex;gap:.5rem;flex-wrap:wrap}
.kb{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;color:var(--t3)}
.key{background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:1px 5px;font-family:'Courier New',monospace;font-size:.66rem;color:var(--t2)}
#main{margin-left:var(--sb-w);flex:1;position:relative;z-index:1}
.top-bar{position:sticky;top:0;z-index:50;background:rgba(3,7,18,.85);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  padding:.75rem 2.5rem;display:flex;align-items:center;gap:1rem}
[data-theme="light"] .top-bar{background:rgba(248,250,252,.9)}
.top-bar-title{font-size:.82rem;color:var(--t2);font-family:'Courier New',monospace}
.top-bar-title span{color:var(--accent)}
.cmd-trigger{margin-left:auto;display:flex;align-items:center;gap:.5rem;
  background:var(--surf);border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;font-size:.8rem;color:var(--t2);cursor:pointer;
  transition:all .25s;white-space:nowrap}
.cmd-trigger:hover{border-color:var(--accent);color:var(--t1)}
.cmd-trigger .kk{font-size:.7rem;background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;font-family:'Courier New',monospace}
section{padding:3.5rem 2.5rem;max-width:820px}
.sh{font-size:1.5rem;font-weight:800;display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.sh-ico{font-size:1.2rem}
.sdiv{height:1px;background:var(--border);margin:1rem 0 2.2rem}
.fi{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.fi.on{opacity:1;transform:translateY(0)}
#hero{padding:3.5rem 2.5rem 2.5rem;border-bottom:1px solid var(--border)}
.hero-tag{display:inline-flex;align-items:center;gap:6px;
  background:rgba(66,133,244,.1);border:1px solid rgba(66,133,244,.25);
  border-radius:6px;padding:3px 12px;font-size:.75rem;color:var(--g-blue);
  font-family:'Courier New',monospace;margin-bottom:1.2rem;letter-spacing:.5px}
.hero-h1{font-size:clamp(1.9rem,4vw,3rem);font-weight:900;line-height:1.1;margin-bottom:.5rem}
.hero-sub{font-size:1rem;color:var(--t2);line-height:1.8;max-width:560px;margin-bottom:1.8rem}
.code-bio{background:var(--surf);border:1px solid var(--border);border-radius:10px;
  padding:1.2rem 1.5rem;font-family:'Courier New',monospace;font-size:.82rem;
  line-height:1.8;position:relative;overflow:hidden}
.code-bio::before{content:'● ● ●';position:absolute;top:.6rem;left:1rem;
  font-size:.7rem;color:var(--t3);letter-spacing:4px}
.code-bio .cb{padding-top:.8rem}
.ck{color:var(--g-blue)}
.cv{color:#34A853}
.cs{color:var(--t2)}
.cn{color:#FBBC04}
.stat-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1.8rem}
.stat-chip{display:flex;align-items:center;gap:.5rem;background:var(--surf);
  border:1px solid var(--border);border-radius:8px;padding:.55rem 1rem;
  transition:all .25s;cursor:default}
.stat-chip:hover{border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 6px 20px var(--glow)}
.sc-n{font-size:1.3rem;font-weight:800;color:var(--accent);font-family:'Courier New',monospace}
.sc-l{font-size:.72rem;color:var(--t2);margin-top:1px}
.ring-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:1.2rem}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem;text-align:center}
.ring-svg{width:88px;height:88px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:7}
.ring-fg{fill:none;stroke-width:7;stroke-linecap:round;
  stroke-dasharray:226;stroke-dashoffset:226;transition:stroke-dashoffset 1.4s cubic-bezier(.25,.46,.45,.94)}
.ring-lbl{font-size:.78rem;color:var(--t2);font-weight:500}
.ring-pct{font-size:.7rem;color:var(--accent);font-family:'Courier New',monospace}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1rem}
.chip-section{margin-top:2rem}
.chip-row-label{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:.6rem}
.chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.2rem}
.chip{padding:4px 12px;border-radius:20px;font-size:.75rem;border:1px solid;
  transition:all .25s;cursor:default;font-family:'Courier New',monospace}
.chip:hover{transform:translateY(-2px);filter:brightness(1.2)}
.chip.blue{color:var(--g-blue);border-color:rgba(66,133,244,.3);background:rgba(66,133,244,.08)}
.chip.grn{color:var(--sp-grn);border-color:rgba(29,185,84,.3);background:rgba(29,185,84,.08)}
.chip.pur{color:var(--st-pur);border-color:rgba(99,91,255,.3);background:rgba(99,91,255,.08)}
.chip.yel{color:var(--g-yel);border-color:rgba(251,188,4,.3);background:rgba(251,188,4,.08)}
.chip.red{color:var(--g-red);border-color:rgba(234,67,53,.3);background:rgba(234,67,53,.08)}
.exp-list{display:flex;flex-direction:column;gap:1.2rem}
.exp-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;
  padding:1.4rem;transition:all .3s;cursor:default;position:relative;overflow:hidden}
.exp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:3px 0 0 3px;background:var(--co);transform:scaleY(0);
  transition:transform .3s;transform-origin:bottom}
.exp-card:hover{border-color:var(--co);box-shadow:0 0 0 1px var(--co),0 8px 30px rgba(0,0,0,.2)}
.exp-card:hover::before{transform:scaleY(1)}
.exp-head{display:flex;align-items:flex-start;gap:1rem;margin-bottom:.9rem;flex-wrap:wrap}
.co-logo{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;flex-shrink:0;border:1px solid var(--border)}
.exp-meta{flex:1}
.exp-title{font-size:1rem;font-weight:700;margin-bottom:.15rem}
.exp-co{font-size:.85rem;font-weight:600;margin-bottom:.1rem}
.exp-period{font-size:.75rem;color:var(--t2);font-family:'Courier New',monospace;
  background:var(--card);padding:2px 10px;border-radius:20px;white-space:nowrap}
.exp-desc{color:var(--t2);font-size:.88rem;line-height:1.7;margin-bottom:.8rem}
.exp-bullets{list-style:none;margin-bottom:.8rem}
.exp-bullets li{color:var(--t2);font-size:.83rem;padding:2px 0 2px 1.1rem;position:relative;line-height:1.6}
.exp-bullets li::before{content:'›';position:absolute;left:0;color:var(--co,var(--accent));font-weight:700}
.exp-tags{display:flex;flex-wrap:wrap;gap:.35rem}
.etag{font-size:.72rem;color:var(--t2);background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:2px 8px;font-family:'Courier New',monospace;transition:all .2s}
.exp-card:hover .etag{border-color:rgba(var(--co-rgb),.3);color:var(--co)}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.filt{background:none;border:1px solid var(--border);border-radius:20px;
  padding:4px 14px;font-size:.78rem;color:var(--t2);cursor:pointer;transition:all .25s}
.filt:hover,.filt.active{background:var(--accent);border-color:var(--accent);color:#fff}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem}
.proj{background:var(--surf);border:1px solid var(--border);border-radius:12px;
  padding:1.3rem;transition:all .3s;display:flex;flex-direction:column}
.proj:hover{transform:translateY(-5px);border-color:var(--accent);
  box-shadow:0 12px 35px var(--glow)}
.proj-ico{font-size:1.8rem;margin-bottom:.7rem}
.proj-name{font-size:.97rem;font-weight:700;margin-bottom:.4rem}
.proj-desc{color:var(--t2);font-size:.83rem;line-height:1.6;flex:1;margin-bottom:.85rem}
.proj-foot{display:flex;justify-content:space-between;align-items:center}
.proj-tags{display:flex;gap:.3rem;flex-wrap:wrap}
.ptag{font-size:.68rem;color:var(--t3);background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:1px 7px;font-family:'Courier New',monospace}
.proj-links{display:flex;gap:.5rem}
.plink{font-size:.78rem;color:var(--accent);text-decoration:none;transition:color .2s}
.plink:hover{color:var(--g-grn)}
.proj.hidden{display:none}
.heatmap-wrap{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:1.4rem}
.hm-title{font-size:.82rem;color:var(--t2);margin-bottom:1rem;display:flex;
  justify-content:space-between;align-items:center}
.hm-total{color:var(--accent);font-weight:600}
#heatmap{display:grid;grid-template-columns:repeat(53,1fr);gap:2px;overflow:hidden}
.hmc{width:100%;aspect-ratio:1;border-radius:2px;background:var(--accent);transition:opacity .2s}
.hmc:hover{opacity:1!important;transform:scale(1.4);z-index:2}
.hm-legend{display:flex;align-items:center;gap:.4rem;margin-top:.75rem;
  font-size:.7rem;color:var(--t3);justify-content:flex-end}
.hml{width:10px;height:10px;border-radius:2px;background:var(--accent)}
.edu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.edu-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;
  padding:1.2rem;transition:all .3s}
.edu-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 25px var(--glow)}
.edu-ico{font-size:1.8rem;margin-bottom:.7rem}
.edu-deg{font-size:.92rem;font-weight:700;margin-bottom:.2rem}
.edu-inst{font-size:.8rem;color:var(--accent);margin-bottom:.3rem}
.edu-yr{font-size:.75rem;color:var(--t2);font-family:'Courier New',monospace}
.edu-note{font-size:.8rem;color:var(--t2);margin-top:.6rem;line-height:1.5}
#cmd-ov{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;
  padding-top:15vh;opacity:0;pointer-events:none;transition:opacity .2s}
#cmd-ov.open{opacity:1;pointer-events:all}
#cmd-box{background:var(--surf);border:1px solid var(--border);border-radius:14px;
  width:min(560px,90vw);box-shadow:0 25px 60px rgba(0,0,0,.5);overflow:hidden;
  transform:translateY(-12px) scale(.97);transition:transform .2s}
#cmd-ov.open #cmd-box{transform:translateY(0) scale(1)}
#cmd-in{width:100%;background:none;border:none;outline:none;padding:1.1rem 1.4rem;
  font-size:1rem;color:var(--t1);font-family:inherit;border-bottom:1px solid var(--border)}
#cmd-in::placeholder{color:var(--t3)}
#cmd-results{max-height:320px;overflow-y:auto}
.cmd-item{display:flex;align-items:center;gap:.85rem;padding:.75rem 1.4rem;
  cursor:pointer;transition:background .15s;font-size:.9rem}
.cmd-item:hover,.cmd-item.sel{background:rgba(66,133,244,.1);color:var(--accent)}
.cmd-item-ico{font-size:1.1rem;width:20px;text-align:center;flex-shrink:0}
.cmd-item-info{flex:1}
.cmd-item-sub{font-size:.74rem;color:var(--t2)}
.cmd-item-key{font-size:.7rem;color:var(--t3);font-family:'Courier New',monospace;
  background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1px 7px}
.cmd-section{padding:.5rem 1.4rem .25rem;font-size:.7rem;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--t3)}
#toast{position:fixed;bottom:1.8rem;right:1.8rem;z-index:9998;
  background:var(--surf);border:1px solid var(--border);border-radius:10px;
  padding:.85rem 1.2rem;display:flex;align-items:center;gap:.7rem;font-size:.88rem;
  max-width:270px;box-shadow:0 8px 30px rgba(0,0,0,.3);
  transform:translateY(80px);opacity:0;transition:all .3s}
#toast.show{transform:translateY(0);opacity:1}
footer{padding:2rem 2.5rem;border-top:1px solid var(--border);
  font-size:.78rem;color:var(--t3);font-family:'Courier New',monospace}
@media(max-width:860px){
  :root{--sb-w:0px}
  #sidebar{transform:translateX(-260px);width:260px;transition:transform .3s}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .top-bar{padding:.7rem 1.2rem}
  section,#hero{padding:2.5rem 1.2rem}
  .mob-toggle{display:flex!important}
  .ring-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
  .proj-grid{grid-template-columns:1fr}
}
.mob-toggle{display:none;background:none;border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--t2);font-size:1rem}
@media print{
  *{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  #sidebar,.top-bar,#cmd-ov,#toast{display:none!important}
  #main{margin-left:0}
  section,#hero{padding:25px 1.5rem}
  .fi{opacity:1!important;transform:none!important}
  .ring-fg{transition:none!important}
}
/* ── PRINT VIEW ── */
#print-view{display:none;width:794px;font-family:'Segoe UI',system-ui,sans-serif;
  font-size:13px;color:#1e293b;background:#fff;position:absolute;top:0;left:-9999px;z-index:-1}
.pv-wrap{width:794px;background:#fff;overflow:hidden}
.pv-bar{height:4px;display:flex}
.pv-bar div{flex:1}
.pv-head{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 55%,#1d4ed8 100%);
  color:#fff;padding:22px 28px;display:flex;align-items:center;gap:18px}
.pv-ini{width:66px;height:66px;border-radius:50%;flex-shrink:0;
  background:conic-gradient(#4285F4 0deg 90deg,#EA4335 90deg 180deg,#FBBC04 180deg 270deg,#34A853 270deg);
  display:flex;align-items:center;justify-content:center;
  font-size:1.45rem;font-weight:900;color:#fff;border:3px solid rgba(255,255,255,.22)}
.pv-hinfo{flex:1}
.pv-hn{font-size:1.5rem;font-weight:900;letter-spacing:-.3px;margin-bottom:2px}
.pv-hr{font-size:.8rem;color:rgba(255,255,255,.68);margin-bottom:7px}
.pv-hc{display:flex;flex-wrap:wrap;gap:2px 16px}
.pv-hci{font-size:.7rem;color:rgba(255,255,255,.58)}
.pv-hbadges{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.pv-hb{font-size:.65rem;padding:2px 8px;border-radius:20px;white-space:nowrap;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.72)}
.pv-body{display:flex;align-items:stretch}
.pv-left{width:224px;flex-shrink:0;background:#f8fafc;border-right:1px solid #e2e8f0;padding:14px 13px}

<aside id="sidebar">

  </div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-contact" id="sb-contact"></div>
  <div class="sb-ctrls">
    <button class="ctrl-btn" id="tbtn">🌙 Tema</button>
    <button class="ctrl-btn dl-btn" id="dlbtn" onclick="downloadPDF()">⬇ PDF</button>
  </div>
  <div class="kb-hint">
    <span class="kb"><kbd class="key">Ctrl</kbd><kbd class="key">K</kbd> Comandos</span>
    <span class="kb"><kbd class="key">T</kbd> Tema</span>
    <span class="kb"><kbd class="key">D</kbd> PDF</span>
  </div>
</aside>

<main id="main">
  <div class="top-bar">
    <button class="mob-toggle" id="mob-tog">☰</button>
    <span class="top-bar-title" id="top-bar-title"></span>
    <button class="cmd-trigger" id="cmd-open-btn">🔍 Buscar… <span class="kk">Ctrl K</span></button>
  </div>

  <section id="hero">
    <div id="inject-hero"></div>
    <div class="stat-row fi" id="inject-stats"></div>
  </section>

  <section id="about" style="display:none">
    <h2 class="sh fi"><span class="sh-ico">💡</span> Sobre Mí</h2>
    <div class="sdiv fi"></div>
    <div class="fi" id="inject-about" style="color:var(--t2);font-size:.95rem;line-height:1.85;max-width:660px"></div>
  </section>

  <section id="skills" style="display:none">
    <h2 class="sh fi"><span class="sh-ico">⚡</span> Habilidades</h2>
    <div class="sdiv fi"></div>
    <div class="ring-grid fi" id="ring-grid"></div>
    <div class="chip-section fi" id="inject-chips"></div>
  </section>

  <section id="experience" style="display:none">
    <h2 class="sh fi"><span class="sh-ico">💼</span> Experiencia</h2>
    <div class="sdiv fi"></div>
    <div class="exp-list fi" id="inject-experience"></div>
  </section>

  <section id="projects" style="display:none">
    <h2 class="sh fi"><span class="sh-ico">🚀</span> Proyectos</h2>
    <div class="sdiv fi"></div>
    <div class="filter-bar fi" id="filter-bar"></div>
    <div class="proj-grid" id="proj-grid"></div>
  </section>

  <section id="contributions" style="display:none">
    <h2 class="sh fi"><span class="sh-ico">📊</span> Actividad GitHub</h2>
    <div class="sdiv fi"></div>
    <div class="heatmap-wrap fi">
      <div class="hm-title">
        <span>Contribuciones en el último año</span>
        <span class="hm-total" id="hm-total">— commits</span>
      </div>
      <div id="heatmap"></div>
      <div class="hm-legend">
        Menos <div class="hml" style="opacity:.1"></div><div class="hml" style="opacity:.3"></div>
        <div class="hml" style="opacity:.55"></div><div class="hml" style="opacity:.8"></div>
        <div class="hml"></div> Más
      </div>
    </div>
  </section>

  <section id="education" style="display:none">
    <h2 class="sh fi"><span class="sh-ico">🎓</span> Educación</h2>
    <div class="sdiv fi"></div>
    <div class="edu-grid fi" id="inject-education"></div>
  </section>

  <footer id="inject-footer"></footer>
</main>

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function renderAll(){
  const D=CV_DATA, M=D.meta;
  document.title=`CV — ${M.name} | ML Engineer`;
  document.getElementById('sb-avatar').textContent=M.avatar;
  document.getElementById('sb-name').textContent=M.name;
  document.getElementById('sb-role').textContent=M.role;
  document.getElementById('top-bar-title').innerHTML=
    `${M.name.split(' ')[1].toLowerCase()} / <span>${M.role.split('·')[0].trim().toLowerCase().replace(/ /g,'-')}</span>`;

  /* Sidebar nav */
  const navDef=[
    {id:'hero',          ico:'🏠', label:'Inicio'},
    {id:'about',         ico:'💡', label:'Sobre mí'},
    {id:'skills',        ico:'⚡', label:'Habilidades'},
    {id:'experience',    ico:'💼', label:'Experiencia'},
    {id:'projects',      ico:'🚀', label:'Proyectos', badge: D.projects.length},
    {id:'contributions', ico:'📊', label:'Actividad'},
    {id:'education',     ico:'🎓', label:'Educación'}
  ];
  document.getElementById('sb-nav').innerHTML=navDef
    .filter(n=>n.id==='hero'||D.sections[n.id])
    .map((n,i)=>`<a class="sb-nav-item${i===0?' active':''}" href="#${n.id}">
      <span class="nav-icon">${n.ico}</span> ${n.label}
      ${n.badge?`<span class="nav-badge">${n.badge}</span>`:''}
    </a>`).join('');

  /* Sidebar contact */
  document.getElementById('sb-contact').innerHTML=`
    <a class="sb-ci" href="mailto:${M.email}"><span class="sb-ci-ico">✉</span> ${M.email}</a>
    <a class="sb-ci" href="#"><span class="sb-ci-ico">💼</span> ${M.linkedin}</a>
    <a class="sb-ci" href="#"><span class="sb-ci-ico">🐙</span> ${M.github}</a>
    <a class="sb-ci" href="#"><span class="sb-ci-ico">📍</span> ${M.location}</a>`;

  /* Footer */
  document.getElementById('inject-footer').innerHTML=
    `${M.name.split(' ')[1].toLowerCase()} &nbsp;·&nbsp; <span style="color:var(--g-blue)">${M.role.split('·')[0].trim().toLowerCase()}</span> &nbsp;·&nbsp; ${M.location} · 2024`;

  /* Show/hide sections */
  const sectionFns={about:renderAbout,skills:renderSkills,experience:renderExperience,
                    projects:renderProjects,contributions:renderContributions,education:renderEducation};
  Object.entries(sectionFns).forEach(([k,fn])=>{
    const el=document.getElementById(k);
    if(D.sections[k]){el.style.display='';fn();}
  });

  renderHero();
  renderPrintView();
}

function renderHero(){
  const h=CV_DATA.hero, jb=h.jsonBio;
  const specsHtml=jb.especialidades.map(s=>`<span class="cv">"${s}"</span>`).join(', ');
  document.getElementById('inject-hero').innerHTML=`
    <div class="hero-tag">${h.tag}</div>
    <h1 class="hero-h1">${h.title}</h1>
    <p class="hero-sub">${h.subtitle}</p>
    <div class="code-bio">
      <div class="cb">
        <span class="ck">{</span><br>
        &nbsp;&nbsp;<span class="ck">"nombre"</span>: <span class="cv">"${jb.nombre}"</span>,<br>
        &nbsp;&nbsp;<span class="ck">"rol"</span>: <span class="cv">"${jb.rol}"</span>,<br>
        &nbsp;&nbsp;<span class="ck">"empresa_actual"</span>: <span class="cv">"${jb.empresa_actual}"</span>,<br>
        &nbsp;&nbsp;<span class="ck">"especialidades"</span>: [${specsHtml}],<br>
        &nbsp;&nbsp;<span class="ck">"open_to_work"</span>: <span class="cn">${jb.open_to_work}</span>,<br>
        &nbsp;&nbsp;<span class="ck">"remote"</span>: <span class="cn">${jb.remote}</span><br>
        <span class="ck">}</span>
      </div>
    </div>`;
  document.getElementById('inject-stats').innerHTML=h.stats.map(s=>
    `<div class="stat-chip"><span class="sc-n" data-cnt="${s.n}" data-suf="${s.suf}">0</span><span class="sc-l">${s.label}</span></div>`
  ).join('');
}

function renderAbout(){
  document.getElementById('inject-about').innerHTML=
    CV_DATA.about.paragraphs.map((p,i)=>`<p${i<CV_DATA.about.paragraphs.length-1?' style="margin-bottom:.9rem"':''}>${p}</p>`).join('');
}

function renderSkills(){
  const C=2*Math.PI*34;
  const rg=document.getElementById('ring-grid');
  rg.innerHTML='';
  CV_DATA.skills.forEach(s=>{
    const offset=C*(1-s.p/100);
    const w=document.createElement('div');
    w.className='ring-wrap';
    w.innerHTML=`
      <div style="position:relative;width:88px;height:88px">
        <svg class="ring-svg" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="34"/>
          <circle class="ring-fg" cx="40" cy="40" r="34" stroke="${s.c}" data-offset="${offset}" style="stroke-dashoffset:${C}"/>
        </svg>
        <div class="ring-center">${s.ico}</div>
      </div>
      <div class="ring-lbl">${s.n}</div>
      <div class="ring-pct" style="color:${s.c}">${s.p}%</div>`;
    rg.appendChild(w);
  });

  document.getElementById('inject-chips').innerHTML=CV_DATA.skillChips.map(sc=>`
    <div class="chip-row-label">${sc.label}</div>
    <div class="chips">${sc.items.map(i=>`<span class="chip ${sc.cls}">${i}</span>`).join('')}</div>`).join('');
}

function renderContributions(){
  const hm=document.getElementById('heatmap');
  let total=0;
  for(let i=0;i<53*7;i++){
    const d=document.createElement('div');d.className='hmc';
    const v=Math.random();
    let op=v<.45?.07:v<.65?.25:v<.8?.5:v<.92?.75:1;
    d.style.opacity=op;
    const commits=op<.1?0:Math.floor(op*12);
    total+=commits;d.title=`${commits} commits`;
    hm.appendChild(d);
  }
  document.getElementById('hm-total').textContent=total.toLocaleString()+' commits';
}

/* ══ INTERSECTION OBSERVER ══ */
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting)return;
    e.target.classList.add('on');
    e.target.querySelectorAll('.ring-fg').forEach(r=>{
      setTimeout(()=>{r.style.strokeDashoffset=r.dataset.offset},100);
    });
    e.target.querySelectorAll('[data-cnt]').forEach(el=>{
      const t=+el.dataset.cnt,suf=el.dataset.suf||'';
      let v=0;const st=t/70;
      const up=()=>{v=Math.min(v+st,t);el.textContent=Math.floor(v)+suf;if(v<t)requestAnimationFrame(up)};
      up();
    });
  });
},{threshold:.1});
document.querySelectorAll('.fi,.tli,.exp-card,.proj').forEach(el=>io.observe(el));

/* ══ ACTIVE NAV ══ */
const navItems=document.querySelectorAll('.sb-nav-item');
document.querySelectorAll('section[id]').forEach(s=>{
  new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting)
      navItems.forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+s.id));
  },{threshold:.3}).observe(s);
});

/* ══ COMMAND PALETTE ══ */
const commands=[
  {g:'Navegar',ico:'🏠',label:'Inicio',         sub:'Volver al principio',           action:()=>scrollTo({top:0,behavior:'smooth'})},
  {g:'Navegar',ico:'⚡',label:'Habilidades',    sub:'Ir a Skills',                   action:()=>document.getElementById('skills')?.scrollIntoView({behavior:'smooth'})},
  {g:'Navegar',ico:'💼',label:'Experiencia',    sub:'Google, Spotify, Stripe',       action:()=>document.getElementById('experience')?.scrollIntoView({behavior:'smooth'})},
  {g:'Navegar',ico:'🚀',label:'Proyectos',      sub:'Ver proyectos open-source',     action:()=>document.getElementById('projects')?.scrollIntoView({behavior:'smooth'})},
  {g:'Navegar',ico:'🎓',label:'Educación',      sub:'MIT, certificaciones',          action:()=>document.getElementById('education')?.scrollIntoView({behavior:'smooth'})},
  {g:'Acciones',ico:'⬇',label:'Descargar PDF', sub:'Exportar CV en formato A4',key:'D',action:()=>downloadPDF()},
  {g:'Acciones',ico:'🌙',label:'Cambiar Tema',  sub:'Alternar claro / oscuro', key:'T',action:()=>toggleTheme()},
  {g:'Acciones',ico:'✉',label:'Contactar',      sub:CV_DATA.meta.email,              action:()=>window.open('mailto:'+CV_DATA.meta.email)},
];
const ov=document.getElementById('cmd-ov'),cin=document.getElementById('cmd-in'),cr=document.getElementById('cmd-results');
let selIdx=0;
function renderCmd(q=''){
  cr.innerHTML='';selIdx=0;
  const filtered=commands.filter(c=>!q||c.label.toLowerCase().includes(q.toLowerCase())||c.sub.toLowerCase().includes(q.toLowerCase()));
  let lastG='';
  filtered.forEach((c,i)=>{
    if(c.g!==lastG){lastG=c.g;const sec=document.createElement('div');sec.className='cmd-section';sec.textContent=c.g;cr.appendChild(sec)}
    const el=document.createElement('div');el.className='cmd-item'+(i===0?' sel':'');
    el.innerHTML=`<span class="cmd-item-ico">${c.ico}</span>
      <div class="cmd-item-info"><div>${c.label}</div><div class="cmd-item-sub">${c.sub}</div></div>
      ${c.key?`<span class="cmd-item-key">${c.key}</span>`:''}`;
    el.addEventListener('click',()=>{closePalette();c.action()});
    cr.appendChild(el);
  });
}
function openPalette(){ov.classList.add('open');cin.value='';renderCmd();cin.focus()}
function closePalette(){ov.classList.remove('open')}
document.getElementById('cmd-open-btn').addEventListener('click',openPalette);
ov.addEventListener('click',e=>{if(e.target===ov)closePalette()});
cin.addEventListener('input',()=>renderCmd(cin.value));
cin.addEventListener('keydown',e=>{
  const items=cr.querySelectorAll('.cmd-item');if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();items[selIdx]?.classList.remove('sel');selIdx=Math.min(selIdx+1,items.length-1);items[selIdx]?.classList.add('sel');items[selIdx]?.scrollIntoView({block:'nearest'})}
  if(e.key==='ArrowUp'){e.preventDefault();items[selIdx]?.classList.remove('sel');selIdx=Math.max(selIdx-1,0);items[selIdx]?.classList.add('sel')}
  if(e.key==='Enter'){const sel=cr.querySelector('.sel');if(sel)sel.click()}
  if(e.key==='Escape')closePalette();
});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openPalette();return}
  if(e.key==='t'||e.key==='T')toggleTheme();
  if(e.key==='d'||e.key==='D')downloadPDF();
  if(e.key==='Escape')closePalette();
});

/* ══ PDF — captura #print-view ══ */
async function downloadPDF(){
  const btn=document.getElementById('dlbtn');
  btn.classList.add('busy');btn.textContent='⏳ PDF…';
  toast('Generando PDF A4…','⚙️');
  const pv=document.getElementById('print-view');
  pv.style.cssText='display:block;position:fixed;top:0;left:-9999px;z-index:-1;width:794px';
  await new Promise(r=>setTimeout(r,350));
  try{
    const {jsPDF}=window.jspdf;
    const A4W=210,A4H=297;
    const cvs=await html2canvas(pv,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',
      scrollX:0,scrollY:0,width:794,height:pv.scrollHeight,windowWidth:794,logging:false});
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const ratio=cvs.width/A4W;
    const totalH=cvs.height/ratio;
    let yOff=0,page=0;
    while(yOff<totalH){
      if(page>0)pdf.addPage();
      const sh=Math.min(A4H,totalH-yOff);
      const sc=document.createElement('canvas');
      sc.width=cvs.width;sc.height=Math.round(sh*ratio);
      sc.getContext('2d').drawImage(cvs,0,Math.round(yOff*ratio),cvs.width,Math.round(sh*ratio),0,0,cvs.width,Math.round(sh*ratio));
      pdf.addImage(sc.toDataURL('image/jpeg',.93),'JPEG',0,0,A4W,sh);
      yOff+=sh;page++;
    }
    pdf.save(CV_DATA.meta.pdfFile);
    toast('PDF descargado!','✅');
  }catch(err){console.error(err);toast('Error al generar PDF','❌');}
  finally{pv.style.cssText='display:none';btn.classList.remove('busy');btn.textContent='⬇ PDF';}
}
