<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">CV — IT Developer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ── VARIABLES ── */
    :root {
      --bg0: #080d14;
      --bg1: #0f1623;
      --bg2: #18202e;
      --t1: #e2e8f0;
      --t2: #8899aa;
      --a1: #00d4ff;
      --a2: #7c3aed;
      --a3: #10b981;
      --border: rgba(0, 212, 255, .18);
      --glow: 0 0 22px rgba(0, 212, 255, .28);
      --r: 10px;
      --trans: .3s ease;
    }

    [data-theme="light"] {
      --bg0: #f0f4f8;
      --bg1: #e8edf3;
      --bg2: #ffffff;
      --t1: #1a2535;
      --t2: #556070;
      --a1: #0077cc;
      --a2: #6d28d9;
      --a3: #059669;
      --border: rgba(0, 119, 204, .18);
      --glow: 0 0 22px rgba(0, 119, 204, .2);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg0);
      color: var(--t1);
      overflow-x: hidden;
      transition: background var(--trans), color var(--trans)
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg1)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--a1);
      border-radius: 3px
    }

    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: .06;
      pointer-events: none
    }

    #pts {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden
    }

    .pt {
      position: absolute;
      border-radius: 50%;
      animation: rise linear infinite;
      opacity: 0
    }

    @keyframes rise {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0
      }

      10% {
        opacity: .5
      }

      90% {
        opacity: .5
      }

      100% {
        transform: translateY(-10vh) translateX(var(--dx));
        opacity: 0
      }
    }

    #prog {
      position: fixed;
      top: 60px;
      left: 0;
      height: 2px;
      width: 0;
      background: linear-gradient(90deg, var(--a1), var(--a2));
      z-index: 900;
      transition: width .1s
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 60px;
      background: rgba(8, 13, 20, .82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem
    }

    [data-theme="light"] nav {
      background: rgba(240, 244, 248, .85)
    }

    .logo {
      font-family: 'Courier New', monospace;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--a1);
      letter-spacing: 2px
    }

    .nav-ul {
      display: flex;
      gap: 1.4rem;
      list-style: none
    }

    .nav-ul a {
      color: var(--t2);
      text-decoration: none;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color var(--trans);
      position: relative;
      padding-bottom: 4px
    }

    .nav-ul a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--a1);
      border-radius: 1px;
      transition: width var(--trans)
    }

    .nav-ul a:hover,
    .nav-ul a.active {
      color: var(--a1)
    }

    .nav-ul a:hover::after,
    .nav-ul a.active::after {
      width: 100%
    }

    .nav-r {
      display: flex;
      align-items: center;
      gap: .75rem
    }

    .tbtn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 35px;
      height: 35px;
      cursor: pointer;
      color: var(--a1);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--trans)
    }

    .tbtn:hover {
      background: var(--a1);
      color: #000;
      box-shadow: var(--glow)
    }

    .dlbtn {
      background: linear-gradient(135deg, var(--a1), var(--a2));
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--trans);
      white-space: nowrap
    }

    .dlbtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0, 212, 255, .4)
    }

    .dlbtn.busy {
      opacity: .65;
      cursor: wait;
      pointer-events: none
    }

    .hbg {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px
    }

    .hbg span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--a1);
      border-radius: 1px;
      transition: all var(--trans)
    }

    .hbg.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg)
    }

    .hbg.open span:nth-child(2) {
      opacity: 0
    }

    .hbg.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg)
    }

    main {
      padding-top: 60px;
      position: relative;
      z-index: 1
    }

    section {
      padding: 80px 2rem;
      max-width: 1080px;
      margin: 0 auto
    }

    .sh {
      font-size: 1.9rem;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      position: relative;
      margin-bottom: .5rem
    }

    .sh .ico {
      color: var(--a1)
    }

    .sh::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 54px;
      height: 3px;
      background: linear-gradient(90deg, var(--a1), transparent);
      border-radius: 2px
    }

    .sdiv {
      height: 1px;
      background: var(--border);
      margin: 1.6rem 0 3rem
    }

    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      max-width: none
    }

    .hero-w {
      max-width: 1080px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 3rem;
      align-items: center
    }

    .htag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 212, 255, .08);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: .78rem;
      color: var(--a1);
      margin-bottom: 1.4rem;
      font-family: 'Courier New', monospace
    }

    .dot-pulse {
      width: 8px;
      height: 8px;
      background: var(--a3);
      border-radius: 50%;
      animation: pulse 2s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.75)
      }
    }

    .hname {
      font-size: clamp(2.4rem, 6vw, 4.4rem);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: .5rem
    }

    .glitch {
      position: relative;
      color: var(--t1)
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%
    }

    .glitch::before {
      color: var(--a1);
      animation: g1 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%)
    }

    .glitch::after {
      color: var(--a2);
      animation: g2 4s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%)
    }

    @keyframes g1 {

      0%,
      88%,
      100% {
        transform: translateX(0);
        opacity: 0
      }

      90% {
        transform: translateX(-3px);
        opacity: .8
      }

      93% {
        transform: translateX(3px);
        opacity: .8
      }

      96% {
        transform: translateX(0);
        opacity: 0
      }
    }

    @keyframes g2 {

      0%,
      84%,
      100% {
        transform: translateX(0);
        opacity: 0
      }

      86% {
        transform: translateX(3px);
        opacity: .8
      }

      89% {
        transform: translateX(-3px);
        opacity: .8
      }

      92% {
        transform: translateX(0);
        opacity: 0
      }
    }

    .hrole {
      font-size: clamp(.95rem, 2.2vw, 1.3rem);
      color: var(--a1);
      font-family: 'Courier New', monospace;
      height: 2rem;
      margin-bottom: 1.4rem
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--a1);
      margin-left: 2px;
      animation: blink .7s infinite;
      vertical-align: text-bottom
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1
      }

      50%,
      100% {
        opacity: 0
      }
    }

    .hdesc {
      font-size: .97rem;
      color: var(--t2);
      line-height: 1.85;
      max-width: 500px;
      margin-bottom: 2rem
    }

    .hcta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap
    }

    .btn-p {
      background: linear-gradient(135deg, var(--a1), #0060aa);
      color: #fff;
      border: none;
      padding: 11px 26px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all var(--trans)
    }

    .btn-p:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 26px rgba(0, 212, 255, .4)
    }

    .btn-o {
      background: transparent;
      color: var(--a1);
      border: 1px solid var(--a1);
      padding: 11px 26px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all var(--trans)
    }

    .btn-o:hover {
      background: rgba(0, 212, 255, .1);
      transform: translateY(-3px)
    }

    .hstats {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      flex-wrap: wrap
    }

    .stat-n {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--a1);
      display: block;
      font-family: 'Courier New', monospace;
      line-height: 1
    }

    .stat-l {
      font-size: .72rem;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .avatar-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      flex-shrink: 0
    }

    .aring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--a1);
      animation: spin 8s linear infinite;
      opacity: .4
    }

    .aring2 {
      inset: -14px;
      border-color: var(--a2);
      opacity: .25;
      animation: spin 13s linear infinite reverse;
      border-style: dashed
    }

    @keyframes spin {
      from {
        transform: rotate(0)
      }

      to {
        transform: rotate(360deg)
      }
    }

    .avar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      box-shadow: 0 0 40px rgba(0, 212, 255, .3);
      overflow: hidden;
      position: relative
    }

    .avar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .12), transparent);
      border-radius: 50%
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.4rem;
      transition: all var(--trans);
      position: relative;
      overflow: hidden
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--a1), var(--a2));
      transform: scaleX(0);
      transition: transform var(--trans)
    }

    .card:hover::before {
      transform: scaleX(1)
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(0, 0, 0, .35), var(--glow);
      border-color: rgba(0, 212, 255, .4)
    }

    .fi {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .65s ease, transform .65s ease
    }

    .fi.on {
      opacity: 1;
      transform: translateY(0)
    }

    .fi-l {
      opacity: 0;
      transform: translateX(-28px);
      transition: opacity .6s ease, transform .6s ease
    }

    .fi-l.on {
      opacity: 1;
      transform: translateX(0)
    }

    .about-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start
    }

    .atext {
      font-size: .95rem;
      color: var(--t2);
      line-height: 1.85
    }

    .atext p {
      margin-bottom: .9rem
    }

    .hl {
      color: var(--a1);
      font-weight: 600
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      margin-top: 1.2rem
    }

    .badge {
      background: rgba(0, 212, 255, .08);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 11px;
      font-size: .78rem;
      color: var(--t2);
      transition: all var(--trans);
      cursor: default;
      font-family: 'Courier New', monospace
    }

    .badge:hover {
      background: rgba(0, 212, 255, .2);
      color: var(--a1);
      border-color: var(--a1);
      transform: translateY(-2px)
    }

    .ilist {
      display: flex;
      flex-direction: column;
      gap: .75rem
    }

    .iitem {
      display: flex;
      align-items: flex-start;
      gap: .9rem;
      padding: .75rem 1rem;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color var(--trans)
    }

    .iitem:hover {
      border-color: var(--a1)
    }

    .iico {
      color: var(--a1);
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 2px
    }

    .ilbl {
      font-size: .7rem;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block
    }

    .ival {
      font-size: .88rem;
      font-weight: 600
    }

    .sk-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.6rem
    }

    .sk-cat-t {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--a1);
      margin-bottom: 1.3rem;
      display: flex;
      align-items: center;
      gap: .5rem
    }

    .sbc {
      margin-bottom: .9rem
    }

    .sbh {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px
    }

    .sbn {
      font-size: .88rem
    }

    .sbp {
      font-size: .78rem;
      color: var(--a1);
      font-family: 'Courier New', monospace
    }

    .sb {
      height: 5px;
      background: rgba(255, 255, 255, .08);
      border-radius: 3px;
      overflow: hidden
    }

    [data-theme="light"] .sb {
      background: rgba(0, 0, 0, .08)
    }

    .sbf {
      height: 100%;
      width: 0;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--a1), var(--a2));
      position: relative;
      transition: width 1.4s cubic-bezier(.25, .46, .45, .94)
    }

    .sbf::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 4px;
      height: 100%;
      background: #fff;
      border-radius: 2px;
      opacity: .7
    }

    .tl {
      position: relative;
      padding-left: 2rem
    }

    .tl::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--a1), var(--a2), transparent)
    }

    .tli {
      position: relative;
      margin-bottom: 2rem
    }

    .tldot {
      position: absolute;
      left: -2.42rem;
      top: 8px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--a1);
      border: 2px solid var(--bg0);
      box-shadow: 0 0 10px var(--a1);
      z-index: 1
    }

    .tlh {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: .4rem;
      margin-bottom: .35rem
    }

    .jt {
      font-size: 1.05rem;
      font-weight: 700
    }

    .jp {
      font-size: .77rem;
      color: var(--a1);
      font-family: 'Courier New', monospace;
      background: rgba(0, 212, 255, .1);
      padding: 2px 10px;
      border-radius: 20px
    }

    .jc {
      font-size: .85rem;
      color: var(--a2);
      margin-bottom: .6rem
    }

    .jd {
      color: var(--t2);
      font-size: .88rem;
      line-height: 1.7;
      margin-bottom: .6rem
    }

    .jach {
      list-style: none;
      margin-bottom: .6rem
    }

    .jach li {
      color: var(--t2);
      font-size: .83rem;
      padding: 2px 0 2px 1.1rem;
      position: relative
    }

    .jach li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--a1)
    }

    .jtechs {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem
    }

    .tt {
      font-size: .73rem;
      color: var(--a3);
      background: rgba(16, 185, 129, .1);
      border: 1px solid rgba(16, 185, 129, .3);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'Courier New', monospace
    }

    .edu-g {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.4rem
    }

    .edu-ico {
      font-size: 2rem;
      margin-bottom: .8rem
    }

    .edu-d {
      font-size: .97rem;
      font-weight: 700;
      margin-bottom: .2rem
    }

    .edu-i {
      color: var(--a1);
      font-size: .82rem;
      margin-bottom: .4rem
    }

    .edu-p {
      color: var(--t2);
      font-size: .78rem;
      font-family: 'Courier New', monospace
    }

    .edu-det {
      margin-top: .65rem;
      color: var(--t2);
      font-size: .83rem;
      line-height: 1.6
    }

    .proj-g {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 1.4rem
    }

    .proj-h {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: .65rem
    }

    .proj-n {
      font-size: 1rem;
      font-weight: 700
    }

    .proj-type {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--a3);
      background: rgba(16, 185, 129, .1);
      padding: 2px 8px;
      border-radius: 4px
    }

    .proj-d {
      color: var(--t2);
      font-size: .84rem;
      line-height: 1.65;
      flex: 1;
      margin-bottom: .8rem
    }

    .plinks {
      display: flex;
      gap: .75rem;
      margin-top: auto
    }

    .plink {
      font-size: .8rem;
      color: var(--a1);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color var(--trans)
    }

    .plink:hover {
      color: var(--a2)
    }

    .ct-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start
    }

    .ct-list {
      display: flex;
      flex-direction: column;
      gap: .9rem
    }

    .ct-item {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: all var(--trans)
    }

    .ct-item:hover {
      border-color: var(--a1);
      transform: translateX(5px)
    }

    .ct-ico {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0
    }

        opacity: 1 !important;
        transform: none !important
      }

      }
    }

</head>

    (() => {

      resize(); addEventListener('resize', resize);
      const chars = '01アイウエオカキクケコタチツテト∑∏√∞≠≈{}[]()<>#!/';
      const fs = 14;
      let cols = Math.floor(cv.width / fs), drops = Array(cols).fill(1);
      setInterval(() => {
        const dark = document.documentElement.dataset.theme !== 'light';
        ctx.fillStyle = dark ? 'rgba(8,13,20,.05)' : 'rgba(240,244,248,.07)';
        ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.fillStyle = dark ? '#00d4ff' : '#0077cc';
        ctx.font = `${fs}px 'Courier New'`;
        for (let i = 0; i < drops.length; i++) {
          ctx.fillText(chars[Math.random() * chars.length | 0], i * fs, drops[i] * fs);
          if (drops[i] * fs > cv.height && Math.random() > .975) drops[i] = 0;
          drops[i]++;

      }, 55);
      addEventListener('resize', () => { cols = Math.floor(cv.width / fs); drops = Array(cols).fill(1) });

        setTimeout(tick, del ? 55 : 100);
      };
      tick();
    })();

    /* ══ SCROLL PROGRESS ══ */
    addEventListener('scroll', () => {
      const pct = scrollY / (document.documentElement.scrollHeight - innerHeight) * 100;
      document.getElementById('prog').style.width = pct + '%';
    });

    /* ══ INTERSECTION OBSERVER ══ */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        e.target.classList.add('on');
        e.target.querySelectorAll('.sbf').forEach(b => {
          setTimeout(() => { b.style.width = b.dataset.pct + '%' }, 150);
        });
        e.target.querySelectorAll('[data-cnt]').forEach(el => {
          const t = +el.dataset.cnt, suf = el.dataset.suf || '';
          let v = 0; const step = t / 80;
          const up = () => { v = Math.min(v + step, t); el.textContent = Math.floor(v) + suf; if (v < t) requestAnimationFrame(up) };
          up();
        });
      });
    }, { threshold: .12 });
    document.querySelectorAll('.fi,.fi-l,.tli').forEach(el => io.observe(el));

    /* ══ ACTIVE NAV ══ */
    const navAs = document.querySelectorAll('.nav-ul a');
    document.querySelectorAll('section[id]').forEach(s =>
      new IntersectionObserver(entries => {
        if (entries[0].isIntersecting)
          navAs.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + s.id));
      }, { threshold: .35 }).observe(s)
    );

    /* ══ THEME TOGGLE ══ */
    let dark = true;
    document.getElementById('tbtn').addEventListener('click', () => {
      dark = !dark;
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      document.getElementById('tbtn').textContent = dark ? '🌙' : '☀️';
    });

    /* ══ HAMBURGER ══ */
    const hbg = document.getElementById('hbg'), navUl = document.getElementById('nav-ul');
    hbg.addEventListener('click', () => { hbg.classList.toggle('open'); navUl.classList.toggle('open') });
    document.querySelectorAll('.nav-ul a').forEach(a => a.addEventListener('click', () => { hbg.classList.remove('open'); navUl.classList.remove('open') }));

    /* ══ CARD TILT ══ */
    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('mousemove', e => {
        const r = c.getBoundingClientRect();
        const rx = (e.clientY - r.top - r.height / 2) / 18;
        const ry = (r.width / 2 - (e.clientX - r.left)) / 18;
        c.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-5px)`;
        c.style.transition = 'transform .08s ease';
      });
      c.addEventListener('mouseleave', () => { c.style.transform = ''; c.style.transition = 'all .4s ease' });
    });

    /* ══ SMOOTH SCROLL ══ */
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        document.querySelector(a.getAttribute('href'))?.scrollIntoView({ behavior: 'smooth' });
      });
    });

    /* ══ NOTIFICATION ══ */
    function notify(txt, ico = '✅') {
      document.getElementById('n-txt').textContent = txt;
      document.getElementById('n-ico').textContent = ico;
      const n = document.getElementById('notif');
      n.classList.add('show');
      setTimeout(() => n.classList.remove('show'), 3200);
    }

    /* ══ PDF DOWNLOAD ══ */
    async function downloadPDF() {
      const btn = document.getElementById('dlbtn');
      btn.classList.add('busy');
      btn.innerHTML = '⏳ <span class="txt">Generando…</span>';
      notify('Preparando PDF A4…', '⚙️');

      const hide = ['nav', '#prog', '#pts', '#rain', '#notif'];
      const saved = hide.map(s => { const el = document.querySelector(s); const d = el?.style.display; if (el) el.style.display = 'none'; return { el, d } });
      const main = document.getElementById('main-content');
      const oldPT = main.style.paddingTop;
      main.style.paddingTop = '0';

      document.querySelectorAll('.fi,.fi-l,.tli').forEach(el => { el.style.opacity = '1'; el.style.transform = 'none' });
      document.querySelectorAll('.sbf').forEach(b => b.style.width = b.dataset.pct + '%');
      document.querySelectorAll('[data-cnt]').forEach(el => el.textContent = el.dataset.cnt + (el.dataset.suf || ''));

      await new Promise(r => setTimeout(r, 400));

      try {
        const { jsPDF } = window.jspdf;
        const A4W = 210, A4H = 297, M = 8;
        const cw = A4W - M * 2;
        const cvs = await html2canvas(main, {
          scale: 2, useCORS: true, allowTaint: true,
          backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg0').trim() || '#080d14',
          scrollX: 0, scrollY: 0, width: main.scrollWidth, height: main.scrollHeight, logging: false
        });
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const ratio = cvs.width / cw;
        const totalH = cvs.height / ratio;
        const pageH = A4H - M * 2;
        let yOff = 0, page = 0;
        while (yOff < totalH) {
          if (page > 0) pdf.addPage();
          const sliceH = Math.min(pageH, totalH - yOff);
          const sc = document.createElement('canvas');
          sc.width = cvs.width; sc.height = sliceH * ratio;
          sc.getContext('2d').drawImage(cvs, 0, yOff * ratio, cvs.width, sliceH * ratio, 0, 0, cvs.width, sliceH * ratio);
          pdf.addImage(sc.toDataURL('image/jpeg', .9), 'JPEG', M, M, cw, sliceH);
          yOff += sliceH; page++;
        }
        pdf.save(CV_DATA.meta.pdfFile);
        notify('PDF descargado con éxito!', '✅');
      } catch (err) {
        console.error(err); notify('Error al generar PDF', '❌');
      } finally {
        saved.forEach(({ el, d }) => { if (el) el.style.display = d ?? '' });
        main.style.paddingTop = oldPT;
        btn.classList.remove('busy');
        btn.innerHTML = '⬇ <span class="txt">Descargar PDF</span>';
      }
    }
  </script>
</body>
