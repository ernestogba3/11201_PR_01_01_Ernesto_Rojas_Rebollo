    .plink {
      font-size: .8rem;
      color: var(--a1);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color var(--trans)
    }

    .plink:hover {
      color: var(--a2)
    }

    .ct-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start
    }

    .ct-list {
      display: flex;
      flex-direction: column;
      gap: .9rem
    }

    .ct-item {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: all var(--trans)
    }

    .ct-item:hover {
      border-color: var(--a1);
      transform: translateX(5px)
    }

    .ct-ico {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0
    }

    .ct-lbl {
      font-size: .7rem;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 2px
    }

    .ct-val {
      font-size: .88rem;
      font-weight: 600
    }

    #notif {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--bg2);
      border: 1px solid var(--a1);
      border-radius: var(--r);
      padding: .9rem 1.3rem;
      display: flex;
      align-items: center;
      gap: .7rem;
      font-size: .88rem;
      z-index: 9999;
      transform: translateY(120px);
      opacity: 0;
      transition: all var(--trans);
      max-width: 280px;
      box-shadow: var(--glow)
    }

    #notif.show {
      transform: translateY(0);
      opacity: 1
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      color: var(--t2);
      font-size: .8rem;
      font-family: 'Courier New', monospace;
      position: relative;
      z-index: 1
    }

    /* ══ MOBILE FIRST (< 480px) ══ */
    @media(max-width:480px) {
      html { font-size: 14px }

      section { padding: 40px 1rem }

      nav { height: 50px; padding: 0 1rem }

      .logo { font-size: 0.9rem }

      .hero-w { grid-template-columns: 1fr; text-align: center }
      .avatar-wrap { margin: 0 auto; width: 120px; height: 120px; order: -1 }
      .aring { width: 130px; height: 130px }
      .aring2 { width: 150px; height: 150px }

      .hname { font-size: 1.8rem; margin: 1rem 0 }
      .hrole { font-size: 0.9rem }
      .hdesc { font-size: 0.85rem; margin: 0 auto 1.5rem }

      .hcta { flex-direction: column; gap: 0.5rem; justify-content: center }
      .hcta a { padding: 0.6rem 1rem; font-size: 0.85rem }

      .hstats { gap: 0.8rem; justify-content: center; flex-wrap: wrap }

      .about-g, .ct-g, .proj-g, .sk-grid { grid-template-columns: 1fr }

      .sh { font-size: 1.3rem }
      .sh::after { height: 2px }

      .nav-ul { display: none; position: absolute; top: 50px; left: 0; right: 0; background: var(--bg1); border-bottom: 1px solid var(--border); flex-direction: column; padding: 1rem 1rem; gap: 0.7rem; z-index: 100 }
      .nav-ul.open { display: flex }
      .nav-ul li a { font-size: 0.95rem }

      .hbg { display: flex }

      .dlbtn { padding: 0.6rem 1rem; font-size: 0.85rem }
      .dlbtn .txt { display: none }
      .tbtn { width: 36px; height: 36px; font-size: 1.2rem }

      .card { padding: 1rem }
      .entry { flex-direction: column }
      .entry__period { margin-top: 0.5rem }

      .jp { font-size: 0.85rem; padding: 3px 12px }

      .tl { padding-left: 0 }
      .tl::before { display: none }
      .tldot { display: none }

      .skill-bar-item { margin-bottom: 0.8rem }

      .badge { padding: 0.4rem 0.8rem; font-size: 0.75rem }
    }

    /* ══ TABLET (480px - 768px) ══ */
    @media(min-width:481px) and (max-width:768px) {
      html { font-size: 15px }

      section { padding: 60px 1.5rem }

      .hero-w { grid-template-columns: 1fr; text-align: center }
      .avatar-wrap { margin: 0 auto; width: 150px; height: 150px }
      .aring { width: 160px; height: 160px }
      .aring2 { width: 180px; height: 180px }

      .hname { font-size: 2.2rem }
      .hdesc { margin: 0 auto 2rem }

      .hcta { justify-content: center }
      .hstats { justify-content: center }

      .about-g, .ct-g { grid-template-columns: 1fr }

      .sk-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) }

      .nav-ul { display: none; position: absolute; top: 60px; left: 0; right: 0; background: var(--bg1); border-bottom: 1px solid var(--border); flex-direction: column; padding: 1rem 1.5rem; gap: 0.9rem }
      .nav-ul.open { display: flex }

      .hbg { display: flex }

      .dlbtn .txt { display: none }
    }

    /* ══ DESKTOP (≥ 769px) ══ */
    @media(min-width:769px) {
      .hbg { display: none }

      .nav-ul { display: flex !important }

      .dlbtn .txt { display: inline }
    }

    @media print {
      * {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact
      }

      nav,
      #prog,
      #pts,
      #rain,
      #notif,
      .tbtn,
      .dlbtn,
      .hbg {
        display: none !important
      }

      main {
        padding-top: 0
      }

      body {
        background: var(--bg0);
        color: var(--t1)
      }

      section {
        padding: 30px 1.5rem
      }

      #hero {
        min-height: auto;
        padding: 30px 1.5rem
      }

      .card:hover {
        transform: none;
        box-shadow: none
      }

      .fi,
      .fi-l,
      .tli {
        opacity: 1 !important;
        transform: none !important
      }

      .sbf {
        transition: none !important
      }

      nav, #prog { display: none !important; }
      body { background: white !important; color: #111 !important; }
      .card { box-shadow: none !important; border: 1px solid #ccc !important; }
      main { padding-top: 0 !important; }
    }

  </style>
</head>

<body>

  <canvas id="rain"></canvas>
  <div id="pts"></div>
  <div id="prog"></div>
  <div id="notif"><span id="n-ico">✅</span><span id="n-txt">Listo</span></div>

  <nav>
    <div class="logo" id="nav-logo" style="cursor: pointer;" onclick="document.getElementById('hero').scrollIntoView({ behavior: 'smooth' })"></div>
    <ul class="nav-ul" id="nav-ul"></ul>
    <div class="nav-r">
      <button class="tbtn" id="tbtn" title="Cambiar tema">🌙</button>
      <button class="dlbtn" id="dlbtn" onclick="downloadPDF()">⬇ <span class="txt">Descargar PDF</span></button>
      <button class="hbg" id="hbg" aria-label="Menú"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main id="main-content">
    <section id="hero">
      <div class="hero-w">
        <div class="hero-l" id="inject-hero"></div>
        <div class="avatar-wrap">
          <div class="aring"></div>
          <div class="aring aring2"></div>
          <div class="avar" id="inject-avatar"></div>
        </div>
      </div>
    </section>
    <section id="about" style="display:none">
      <h2 class="sh fi"><span class="ico">🧑</span>Sobre Mí</h2>
      <div class="sdiv fi"></div>
      <div class="about-g fi" id="inject-about"></div>
    </section>
    <section id="skills" style="display:none">
      <h2 class="sh fi"><span class="ico">⚡</span>Habilidades</h2>
      <div class="sdiv fi"></div>
      <div class="sk-grid fi" id="inject-skills"></div>
    </section>
    <section id="education" style="display:none">
      <h2 class="sh fi"><span class="ico">🎓</span>Educación</h2>
      <div class="sdiv fi"></div>
      <div class="edu-g fi" id="inject-education"></div>
      <div id="inject-training" style="margin-top: 2rem;"></div>
    </section>
    <section id="languages" style="display:none">
      <h2 class="sh fi"><span class="ico">🌍</span>Idiomas</h2>
      <div class="sdiv fi"></div>
      <div class="proj-g fi" id="inject-languages"></div>
    </section>
    <section id="experience" style="display:none">
      <h2 class="sh fi"><span class="ico">💼</span>Experiencia</h2>
      <div class="sdiv fi"></div>
      <div class="tl fi" id="inject-experience"></div>
    </section>
    <section id="projects" style="display:none">
      <h2 class="sh fi"><span class="ico">🚀</span>Proyectos</h2>
      <div class="sdiv fi"></div>
      <div class="proj-g fi" id="inject-projects"></div>
    </section>
    <section id="achievements" style="display:none">
      <h2 class="sh fi"><span class="ico">🏆</span>Logros y Reconocimientos</h2>
      <div class="sdiv fi"></div>
      <div class="proj-g fi" id="inject-achievements"></div>
    </section>
    <section id="volunteering" style="display:none">
      <h2 class="sh fi"><span class="ico">🤝</span>Voluntariado</h2>
      <div class="sdiv fi"></div>
      <div class="proj-g fi" id="inject-volunteering"></div>
    </section>
    <section id="interests" style="display:none">
      <h2 class="sh fi"><span class="ico">❤️</span>Intereses</h2>
      <div class="sdiv fi"></div>
      <div class="proj-g fi" id="inject-interests"></div>
    </section>
    <section id="contact" style="display:none">
      <h2 class="sh fi"><span class="ico">📬</span>Contacto</h2>
      <div class="sdiv fi"></div>
      <div class="ct-g fi" id="inject-contact"></div>
    </section>
  </main>

  <footer id="inject-footer"></footer>

  <script>
    /* ══════════════════════════════════════════════════
       CV DATA — todo el contenido editable aquí
    ══════════════════════════════════════════════════ */
    const CV_DATA = {

      /* Secciones visibles: cambiar a false para ocultar */
      sections: {
        about: true, skills: true, education: true, languages: true, experience: true,
        projects: true, achievements: true, volunteering: true, interests: true, contact: true
      },

      /* Datos personales */
      meta: {
        name: "{{ cv.personal_info.nombre }} {{ cv.personal_info.apellidos }}",
        initials: "{{ cv.personal_info.nombre|first }}{{ cv.personal_info.apellidos|first }}",
        avatar: "{{ cv.personal_info.foto }}",
        email: "{{ cv.personal_info.email_profesional1 }}",
        phone: "{{ cv.personal_info.telefono1 }}",
        linkedin: "{{ cv.social_network.linkedin|default:'' }}",
        github: "{{ cv.social_network.github|default:'' }}",
        portfolio: "{{ cv.social_network.portfolio|default:'' }}",
        location: "{{ cv.personal_info.ciudad }}, {{ cv.personal_info.pais }}",
        pdfFile: "CV-{{ cv.personal_info.nombre }}-{{ cv.personal_info.apellidos }}.pdf"
      },

      /* Hero */
      hero: {
        tagline: "{{ cv.personal_info.disponibilidad|default:'Disponible' }} · Open to Work",
        roles: [
          "{{ cv.professional_profile.profesion|default:'Developer' }}"
          {% for x in habilidades|slice:":3" %}
          {% if x.tipo == 'Tecnica' %},
          "{{ x.nombre }}"
          {% endif %}
          {% endfor %}
        ],
    description: "{{ cv.professional_profile.resumen|escapejs }}",
      stats: [
        { n: 0, suf: '', label: 'Experiencias' },
        { n: 0, suf: '', label: 'Proyectos' },
        { n: 0, suf: '', label: 'Skills' },
        { n: 0, suf: '', label: 'Idiomas' }
      ]
      },

    /* Sobre mí */
    about: {
      paragraphs: [
        'Soy un <span class="hl">Full Stack Developer</span> especializado en el ecosistema JavaScript/TypeScript y cloud computing. Me apasiona crear soluciones que combinen rendimiento, seguridad y experiencia de usuario excepcional.',
        'Con experiencia en <span class="hl">startups y corporaciones</span>, he liderado equipos, diseñado arquitecturas distribuidas y optimizado sistemas críticos procesando millones de eventos diarios.',
        'Actualmente profundizando en <span class="hl">IA/ML aplicada</span> al desarrollo de software y arquitecturas serverless en AWS y GCP.'
      ],
        badges: ['JavaScript', 'TypeScript', 'React', 'Node.js', 'Python', 'Docker', 'Kubernetes', 'AWS', 'PostgreSQL', 'MongoDB', 'GraphQL', 'Redis'],
          info: [
            { ico: '✉', label: 'Email', val: '{{ cv.personal_info.email_profesional1 }}' },
            { ico: '💼', label: 'LinkedIn', val: '{{ cv.social_network.linkedin|default:"" }}' },
            { ico: '🐙', label: 'GitHub', val: '{{ cv.social_network.github|default:"" }}' },
            { ico: '🌐', label: 'Portfolio', val: '{{ cv.social_network.portfolio|default:"" }}' },
            { ico: '📞', label: 'Teléfono', val: '{{ cv.personal_info.telefono1 }}' }
          ]
    },

    /* Habilidades */
    skills: [
      {
        cat: 'Habilidades técnicas',
        items: [
          {% for skill in habilidades %}
          { name: '{{ skill.nombre|escapejs }}', pct: {{ skill.nivel|default:50 }} }{% if not forloop.last %},{% endif %}
          {% endfor %}
        ]
      }
    ],

    /* Idiomas */
    languages: [
      {% for lang in idiomas %}
      { ico: '🌐', name: '{{ lang.idioma|escapejs }}', level: '{{ lang.nivel|escapejs }}', cert: '{{ lang.certificacion|escapejs }}' }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ],

    /* Formación Complementaria */
    training: [
      {% for form in formaciones %}
      { ico: '📚', type: '{{ form.tipo|default:""|escapejs }}', name: '{{ form.nombre|default:""|escapejs }}', entity: '{{ form.entidad|default:""|escapejs }}', desc: '{{ form.descripcion|default:""| escapejs }}', date: '{{ form.fecha|default:""| date:"Y" }}' }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ],

      /* Experiencia */
      experience: [
        {% for exp in experiencias %}
        {
          title: '{{ exp.puesto|escapejs }}', period: '{% if exp.trabajo_actual %}Trabaja actualmente{% else %}{{ exp.fecha_inicio|date:"b Y" }} - {{ exp.fecha_fin|date:"b d" }}{% endif %}',
          company: '{{ exp.empresa|escapejs }}{% if exp.ubicacion %} · {{ exp.ubicacion|escapejs }}{% endif %}',
          desc: '{{ exp.descripcion|default:""| escapejs }}',
          bullets: [
            '{{ exp.descripcion|default:""|escapejs }}'
          ],
          techs: []
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
      ],

        /* Educación */
        education: [
          {% for edu in educaciones %}
          {
            ico: '🎓',
            degree: '{{ edu.titulo|escapejs }}',
            institution: '{{ edu.centro|escapejs }}',
            location: '{{ edu.ubicacion|escapejs }}',
            period: '{% if edu.en_curso %}En curso{% else %}{{ edu.fecha_inicio|date:"b Y" }} - {{ edu.fecha_fin|date:"b Y" }}{% endif %}',
            en_curso: {{ edu.en_curso|lower }}
          }{% if not forloop.last %},{% endif %}
          {% endfor %}
        ],

          /* Proyectos */
          projects: [
            {% for proj in proyectos %}
            { ico: '🎯', name: '{{ proj.nombre|escapejs }}', type: '{{ proj.nombre|truncatewords:1|escapejs }}', desc: '{{ proj.descripcion|default:""| escapejs }}', techs: [], links: [{% if proj.link %}{ label: '🔗 Ver', href: '{{ proj.link|escapejs }}' }{% endif %}] }{% if not forloop.last %},{% endif %}
            {% endfor %}
          ],

          /* Logros y Reconocimientos */
          achievements: [
            {% for logro in logros %}
            { ico: '🏆', title: '{{ logro.titulo|escapejs }}', type: '{{ logro.tipo|escapejs }}', desc: '{{ logro.descripcion|default:""| escapejs }}', date: '{{ logro.fecha|date:"b Y" }}' }{% if not forloop.last %},{% endif %}
            {% endfor %}
          ],

          /* Voluntariado */
          volunteering: [
            {% for vol in voluntariados %}
            { ico: '🤝', org: '{{ vol.organizacion|escapejs }}', role: '{{ vol.funcion|escapejs }}', impact: '{{ vol.impacto|default:""| escapejs }}', current: {{ vol.en_curso|lower }}, period: '{% if vol.en_curso %}En curso{% else %}{{ vol.fecha_inicio|date:"b Y" }} - {{ vol.fecha_fin|date:"b Y" }}{% endif %}' }{% if not forloop.last %},{% endif %}
            {% endfor %}
          ],

          /* Intereses */
          interests: [
            {% for interes in intereses %}
            '{{ interes.nombre|escapejs }}'{% if not forloop.last %},{% endif %}
            {% endfor %}
          ],

            /* Contacto */
            contact: {
      items: [
        {% if cv.personal_info.email_profesional1 %}{ ico: '✉', label: 'Email', val: '{{ cv.personal_info.email_profesional1 }}' },{% endif %}
        {% if cv.personal_info.telefono1 %}{ ico: '📞', label: 'Teléfono', val: '{{ cv.personal_info.telefono1 }}' },{% endif %}
        {% if cv.social_network.linkedin %}{ ico: '💼', label: 'LinkedIn', val: '{{ cv.social_network.linkedin }}' },{% endif %}
        {% if cv.social_network.github %}{ ico: '🐙', label: 'GitHub', val: '{{ cv.social_network.github }}' }{% endif %}
      ],
        cta: {
        title: '¿Tienes un proyecto en mente?',
          desc: '{{ cv.professional_profile.objetivo|default:"Estoy abierto a nuevas oportunidades y colaboraciones." |escapejs }}',
            badges: ['💼 Disponible', '{{ cv.personal_info.disponibilidad|default:"Remoto" }}']
      }
    }
    };

    // Procesar stats: usar datos reales si existen, números aleatorios si no
    const exp_count = parseInt('{{ experiencias|length }}') || 0;
    const proj_count = parseInt('{{ proyectos|length }}') || 0;
    const skill_count = parseInt('{{ habilidades|length }}') || 0;
    const lang_count = parseInt('{{ idiomas|length }}') || 0;

    console.log('Stats debug:', { exp_count, proj_count, skill_count, lang_count });

    CV_DATA.hero.stats[0].n = exp_count || Math.floor(Math.random() * 15) + 5;
    CV_DATA.hero.stats[1].n = proj_count || Math.floor(Math.random() * 20) + 8;
    CV_DATA.hero.stats[2].n = skill_count || Math.floor(Math.random() * 25) + 10;
    CV_DATA.hero.stats[3].n = lang_count || Math.floor(Math.random() * 8) + 3;

    /* ══════════════════════════════════════════════════
       RENDER — construye el DOM desde CV_DATA
    ══════════════════════════════════════════════════ */
    function renderAll() {
      const D = CV_DATA, M = D.meta;
      document.title = `CV — ${M.name} | ${D.hero.roles[0]}`;
      document.getElementById('nav-logo').innerHTML = `&lt;${M.initials} /&gt;`;
      document.getElementById('inject-footer').innerHTML =
        `&lt;/&gt; con ❤ por <span style="color:var(--a1)">${M.name}</span> &nbsp;·&nbsp; <span style="color:var(--a3)">Open to work 2024</span>`;
      document.getElementById('inject-avatar').style.backgroundImage = `url('${M.avatar}')`;

      const navLabels = { about: 'Sobre mí', skills: 'Skills', education: 'Educación', languages: 'Idiomas', experience: 'Experiencia', projects: 'Proyectos', achievements: 'Logros', volunteering: 'Voluntariado', interests: 'Intereses', contact: 'Contacto' };
      document.getElementById('nav-ul').innerHTML = Object.entries(navLabels)
        .filter(([k]) => D.sections[k])
        .map(([k, v]) => `<li><a href="#${k}">${v}</a></li>`).join('');

      renderHero();

      const fns = {
        about: renderAbout, skills: renderSkills, education: renderEducation, languages: renderLanguages, experience: renderExperience,
        projects: renderProjects, achievements: renderAchievements, volunteering: renderVolunteering, interests: renderInterests, contact: renderContact
      };
      Object.entries(fns).forEach(([k, fn]) => {
        const el = document.getElementById(k);
        if (D.sections[k]) { el.style.display = ''; fn(); }
      });
    }

    function renderHero() {
      const h = CV_DATA.hero, M = CV_DATA.meta;
      document.getElementById('inject-hero').innerHTML = `
    <div class="htag"><span class="dot-pulse"></span> ${h.tagline}</div>
    <h1 class="hname"><span class="glitch" data-text="${M.name}">${M.name}</span></h1>
    <div class="hrole"><span id="typed"></span><span class="cursor"></span></div>
    <p class="hdesc">${h.description}</p>
    <div class="hcta">
      <a href="#contact" class="btn-p">Contactar ✉</a>
      <a href="#projects" class="btn-o">Ver Proyectos →</a>
    </div>
    <div class="hstats">
      ${h.stats.map(s => `<div><span class="stat-n" data-cnt="${s.n}" data-suf="${s.suf}">0</span><span class="stat-l">${s.label}</span></div>`).join('')}
    </div>`;
    }

    function renderAbout() {
      const a = CV_DATA.about;
      document.getElementById('inject-about').innerHTML = `
    <div>
      <div class="atext">${a.paragraphs.map(p => `<p>${p}</p>`).join('')}</div>
      <div class="badges">${a.badges.map(b => `<span class="badge">${b}</span>`).join('')}</div>
    </div>
    <div class="ilist">
      ${a.info.map(i => `<div class="iitem"><span class="iico">${i.ico}</span><div><span class="ilbl">${i.label}</span><span class="ival">${i.val}</span></div></div>`).join('')}
    </div>`;
    }

    function renderSkills() {
      document.getElementById('inject-skills').innerHTML = CV_DATA.skills.map(cat => `
    <div class="card">
      <div class="sk-cat-t">${cat.cat}</div>
      ${cat.items.map(s => `
        <div class="sbc">
          <div class="sbh"><span class="sbn">${s.name}</span><span class="sbp">${s.pct}%</span></div>
          <div class="sb"><div class="sbf" data-pct="${s.pct}"></div></div>
        </div>`).join('')}
    </div>`).join('');
    }

    function renderLanguages() {
      document.getElementById('inject-languages').innerHTML = CV_DATA.languages.map(l => `
    <div class="card" style="display:flex;flex-direction:column">
      <div class="proj-h"><span class="proj-n">${l.ico} ${l.name}</span><span class="proj-type">${l.level}</span></div>
      <p style="color:var(--t2);font-size:0.85rem;margin:0">${l.cert}</p>
    </div>`).join('');
    }

    function renderTraining() {
      if (!CV_DATA.training || CV_DATA.training.length === 0) {
        document.getElementById('inject-training').innerHTML = '';
        return;
      }
      document.getElementById('inject-training').innerHTML = `
    <h3 style="font-size:1.1rem;margin-bottom:1rem;color:var(--t1)">📚 Formación Complementaria</h3>
    <div class="proj-g fi">
      ${CV_DATA.training.map(t => `
    <div class="card" style="display:flex;flex-direction:column">
      <div class="proj-h"><span class="proj-n">${t.ico} ${t.name}</span><span class="proj-type">${t.type}</span></div>
      <p style="color:var(--t2);font-size:0.85rem;margin:0 0 0.5rem 0;font-weight:600">${t.entity}</p>
      <p class="proj-d">${t.desc}</p>
      ${t.date ? `<div style="font-size:0.85rem;color:var(--t2)">📅 ${t.date}</div>` : ''}
    </div>`).join('')}
    </div>`;
    }

    function renderExperience() {
      document.getElementById('inject-experience').innerHTML = CV_DATA.experience.map(e => `
    <div class="tli card">
      <div class="tldot"></div>
      <div class="tlh"><span class="jt">${e.title}</span><span class="jp">${e.period}</span></div>
      <div class="jc">${e.company}</div>
      <p class="jd">${e.desc}</p>
      <ul class="jach">${e.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
      <div class="jtechs">${e.techs.map(t => `<span class="tt">${t}</span>`).join('')}</div>
    </div>`).join('');
    }

    function renderEducation() {
      document.getElementById('inject-education').innerHTML = CV_DATA.education.map(e => `
    <div class="card">
      <div class="tlh"><span class="jt">${e.ico} ${e.degree}</span><span class="jp">${e.period}</span></div>
      <div class="jc">${e.institution}${e.location ? ' · ' + e.location : ''}</div>
      <span class="proj-type" style="display:inline-block; margin-top:0.5rem">${e.en_curso ? 'En curso' : 'Finalizado'}</span>
    </div>`).join('');
      renderTraining();
    }

    function renderProjects() {
      document.getElementById('inject-projects').innerHTML = CV_DATA.projects.map(p => `
    <div class="card" style="display:flex;flex-direction:column">
      <div class="proj-h"><span class="proj-n">${p.ico} ${p.name}</span><span class="proj-type">${p.type}</span></div>
      <p class="proj-d">${p.desc}</p>
      <div class="jtechs" style="margin-bottom:.75rem">${p.techs.map(t => `<span class="tt">${t}</span>`).join('')}</div>
      <div class="plinks">${p.links.map(l => `<a href="${l.href}" class="plink">${l.label}</a>`).join('')}</div>
    </div>`).join('');
    }

    function renderAchievements() {
      document.getElementById('inject-achievements').innerHTML = CV_DATA.achievements.map(a => `
    <div class="card" style="display:flex;flex-direction:column">
      <div class="proj-h"><span class="proj-n">${a.ico} ${a.title}</span><span class="proj-type">${a.type}</span></div>
      <p class="proj-d">${a.desc}</p>
      ${a.date ? `<div style="font-size:0.85rem;color:var(--t2);margin-top:0.5rem">📅 ${a.date}</div>` : ''}
    </div>`).join('');
    }

    function renderVolunteering() {
      document.getElementById('inject-volunteering').innerHTML = CV_DATA.volunteering.map(v => `
    <div class="card" style="display:flex;flex-direction:column">
      <div class="proj-h"><span class="proj-n">${v.ico} ${v.role}</span><span class="proj-type">${v.current ? 'En curso' : 'Completado'}</span></div>
      <p style="color:var(--t2);font-size:0.85rem;margin:0 0 0.25rem 0;font-weight:600">${v.org}</p>
      ${v.period ? `<p style="color:var(--t2);font-size:0.8rem;margin:0 0 0.5rem 0">📅 ${v.period}</p>` : ''}
      <p class="proj-d">${v.impact}</p>
    </div>`).join('');
    }

    function renderInterests() {
      document.getElementById('inject-interests').innerHTML = CV_DATA.interests.map(i => `
    <div class="card" style="display:flex;align-items:center;justify-content:center;min-height:80px;text-align:center;padding:1rem">
      <span style="font-size:1rem">${i}</span>
    </div>`).join('');
    }

    function renderContact() {
      const c = CV_DATA.contact;
      document.getElementById('inject-contact').innerHTML = `
    <div class="ct-list">
      ${c.items.map(i => `
        <div class="ct-item">
          <div class="ct-ico">${i.ico}</div>
          <div><span class="ct-lbl">${i.label}</span><span class="ct-val">${i.val}</span></div>
        </div>`).join('')}
    </div>
    <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:240px;gap:1rem">
      <div style="font-size:3rem">💬</div>
      <h3 style="font-size:1.15rem">${c.cta.title}</h3>
      <p style="color:var(--t2);font-size:.88rem;line-height:1.65">${c.cta.desc}</p>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center">
        ${c.cta.badges.map(b => `<span class="badge">${b}</span>`).join('')}
      </div>
    </div>`;
    }

    /* Renderizar todo al cargar */
    renderAll();

    /* ══ MATRIX RAIN ══ */
    (() => {
      const cv = document.getElementById('rain'), ctx = cv.getContext('2d');
      const resize = () => { cv.width = innerWidth; cv.height = innerHeight };
      resize(); addEventListener('resize', resize);
      const chars = '01アイウエオカキクケコタチツテト∑∏√∞≠≈{}[]()<>#!/';
      const fs = 14;
      let cols = Math.floor(cv.width / fs), drops = Array(cols).fill(1);
      setInterval(() => {
        const dark = document.documentElement.dataset.theme !== 'light';
        ctx.fillStyle = dark ? 'rgba(8,13,20,.05)' : 'rgba(240,244,248,.07)';
        ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.fillStyle = dark ? '#00d4ff' : '#0077cc';
        ctx.font = `${fs}px 'Courier New'`;
        for (let i = 0; i < drops.length; i++) {
          ctx.fillText(chars[Math.random() * chars.length | 0], i * fs, drops[i] * fs);
          if (drops[i] * fs > cv.height && Math.random() > .975) drops[i] = 0;
          drops[i]++;
        }
      }, 55);
      addEventListener('resize', () => { cols = Math.floor(cv.width / fs); drops = Array(cols).fill(1) });
    })();

    /* ══ PARTICLES ══ */
    (() => {
      const c = document.getElementById('pts');
      const mk = () => {
        const p = document.createElement('div');
        p.className = 'pt';
        const sz = 1 + Math.random() * 3, dur = 9 + Math.random() * 11, dx = (Math.random() - .5) * 180;
        p.style.cssText = `left:${Math.random() * 100}%;width:${sz}px;height:${sz}px;background:var(--a1);animation-duration:${dur}s;animation-delay:${Math.random() * 4}s;--dx:${dx}px`;
        c.appendChild(p);
        setTimeout(() => p.remove(), (dur + 4) * 1000);
      };
      for (let i = 0; i < 30; i++)mk();
      setInterval(mk, 500);
    })();

    /* ══ TYPING EFFECT — usa CV_DATA.hero.roles ══ */
    (() => {
      const roles = CV_DATA.hero.roles;
      let ri = 0, ci = 0, del = false;
      const el = document.getElementById('typed');
      const tick = () => {
        const r = roles[ri];
        if (!del) { el.textContent = r.slice(0, ++ci); if (ci === r.length) { del = true; setTimeout(tick, 2200); return } }
        else { el.textContent = r.slice(0, --ci); if (ci === 0) { del = false; ri = (ri + 1) % roles.length } }
        setTimeout(tick, del ? 55 : 100);
      };
      tick();
    })();

    /* ══ SCROLL PROGRESS ══ */
    addEventListener('scroll', () => {
      const pct = scrollY / (document.documentElement.scrollHeight - innerHeight) * 100;
      document.getElementById('prog').style.width = pct + '%';
    });

    /* ══ INTERSECTION OBSERVER ══ */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        e.target.classList.add('on');
        e.target.querySelectorAll('.sbf').forEach(b => {
          setTimeout(() => { b.style.width = b.dataset.pct + '%' }, 150);
        });
        e.target.querySelectorAll('[data-cnt]').forEach(el => {
          const t = +el.dataset.cnt, suf = el.dataset.suf || '';
          let v = 0; const step = t / 80;
          const up = () => { v = Math.min(v + step, t); el.textContent = Math.floor(v) + suf; if (v < t) requestAnimationFrame(up) };
          up();
        });
      });
    }, { threshold: .12 });
    document.querySelectorAll('.fi,.fi-l,.tli').forEach(el => io.observe(el));

    /* ══ ACTIVE NAV ══ */
    const navAs = document.querySelectorAll('.nav-ul a');
    document.querySelectorAll('section[id]').forEach(s =>
      new IntersectionObserver(entries => {
        if (entries[0].isIntersecting)
          navAs.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + s.id));
      }, { threshold: .35 }).observe(s)
    );

    /* ══ THEME TOGGLE ══ */
    let dark = true;
    document.getElementById('tbtn').addEventListener('click', () => {
      dark = !dark;
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      document.getElementById('tbtn').textContent = dark ? '🌙' : '☀️';
    });

    /* ══ HAMBURGER ══ */
    const hbg = document.getElementById('hbg'), navUl = document.getElementById('nav-ul');
    hbg.addEventListener('click', () => { hbg.classList.toggle('open'); navUl.classList.toggle('open') });
    document.querySelectorAll('.nav-ul a').forEach(a => a.addEventListener('click', () => { hbg.classList.remove('open'); navUl.classList.remove('open') }));

    /* ══ CARD TILT ══ */
    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('mousemove', e => {
        const r = c.getBoundingClientRect();
        const rx = (e.clientY - r.top - r.height / 2) / 18;
        const ry = (r.width / 2 - (e.clientX - r.left)) / 18;
        c.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-5px)`;
        c.style.transition = 'transform .08s ease';
      });
      c.addEventListener('mouseleave', () => { c.style.transform = ''; c.style.transition = 'all .4s ease' });
    });

    /* ══ SMOOTH SCROLL ══ */
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        document.querySelector(a.getAttribute('href'))?.scrollIntoView({ behavior: 'smooth' });
      });
    });

    /* ══ NOTIFICATION ══ */
    function notify(txt, ico = '✅') {
      document.getElementById('n-txt').textContent = txt;
      document.getElementById('n-ico').textContent = ico;
      const n = document.getElementById('notif');
      n.classList.add('show');
      setTimeout(() => n.classList.remove('show'), 3200);
    }

    /* ══ PDF DOWNLOAD ══ */
    function downloadPDF() {
      window.print();
    }

    /* ══ DARK/LIGHT THEME TOGGLE ══ */
    const tbtn = document.getElementById('tbtn');
    const html = document.documentElement;

    if (tbtn) {
      // Cargar tema guardado al iniciar
      const savedTheme = localStorage.getItem('theme') || 'dark';
      html.dataset.theme = savedTheme;
      tbtn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

      // Toggle tema al hacer click
      tbtn.addEventListener('click', () => {
        const isDark = html.dataset.theme === 'dark';
        html.dataset.theme = isDark ? 'light' : 'dark';
        localStorage.setItem('theme', html.dataset.theme);
        tbtn.textContent = isDark ? '☀️' : '🌙';
      });
    }
  </script>

</body>

</html>
